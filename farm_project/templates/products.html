{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-6xl mx-auto px-6 py-20">
    <h1 class="text-4xl font-light text-green-900 mb-12 text-center">Our Products</h1>
    <div class="grid md:grid-cols-3 gap-8">
        {% for product in products %}
        <div class="border border-gray-100 rounded-2xl p-6 shadow-sm">
            {% if product.image %}
                <img src="{{ product.image.url }}" class="w-full h-48 object-cover rounded-xl mb-4">
            {% endif %}
            <h3 class="text-xl font-semibold text-green-900">{{ product.name }}</h3>
            <p class="text-gray-600 my-2">{{ product.description }}</p>
            <span class="text-green-800 font-bold">${{ product.price }}</span>
        </div>
        {% empty %}
        <p>No products available.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
