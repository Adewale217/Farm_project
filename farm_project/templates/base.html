{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordar Foods Limited</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-white">

    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-gray-100 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-green-800">Jordar Foods Limited</div>
            
            <!-- Navigation Links -->
            <div class="flex items-center space-x-8 text-sm font-medium text-gray-600">
                <a href="/" class="hover:text-green-700 transition">Home</a>
                <a href="#" class="hover:text-green-700 transition">About Us</a>
                <a href="#" class="hover:text-green-700 transition">Contact</a>
                
                <!-- Product Dropdown -->
                <div class="relative group">
                    <button class="flex items-center hover:text-green-700 transition duration-300">
                        Products 
                        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
    
                    <!-- Updated Dropdown classes -->
                    <div class="absolute right-0 w-40 bg-white border border-gray-100 rounded-xl shadow-lg mt-0 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform origin-top">
                        <a href="{% url 'product_list' %}" class="block px-4 py-3 text-sm hover:bg-green-50 text-gray-700">All Products</a>
                        <a href="#" class="block px-4 py-3 text-sm hover:bg-green-50 text-gray-700">Foods</a>
                        <a href="#" class="block px-4 py-3 text-sm hover:bg-green-50 text-gray-700">Fruits</a>
                        <a href="#" class="block px-4 py-3 text-sm hover:bg-green-50 text-gray-700">Animals</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-24">
        {% block content %}
        {% endblock %}
    </main>

<footer class="bg-green-900 text-green-100 py-12">
    <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center">
        <p class="text-sm">&copy; 2026 Jordar Foods Limited. All rights reserved.</p>
        <div class="space-x-6 mt-4 md:mt-0">
            <a href="#" class="hover:text-white transition">Privacy</a>
            <a href="#" class="hover:text-white transition">Terms</a>
            <a href="#" class="hover:text-white transition">Support</a>
        </div>
    </div>
</footer>
</body> 
</html>
